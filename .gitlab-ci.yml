include:
  - project: "waldur/waldur-pipelines"
    file: "/templates/test/vulnerability-scan.yml"

stages:
  - build
  - test
  - release
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn"

cache:
  key:
    files:
      - pom.xml
  paths:
    - .m2/repository

.Build JAR template:
  stage: build
  script:
    - mvn -B clean install -DskipITs
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
    expire_in: 1 week

Build JAR:
  image: maven:3.9-eclipse-temurin-17
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  extends: .Build JAR template

# Integration tests boot a Keycloak container with the freshly-built shaded JAR
# mounted as a provider, then verify all three protocol mappers are registered.
# Uses the same DinD pattern as waldur-mastermind / waldur-pipelines: the mirrored
# docker:27-dind image with --mtu=1400 (required for the runner network) aliased
# as `docker`. TLS is disabled to keep the maven container simple — internal CI only.
Integration tests:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  services:
    - name: registry.hpc.ut.ee/mirror/library/docker:27-dind
      command: ["--mtu=1400", "--tls=false"]
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    # Tell Testcontainers that ports published by sibling containers are reachable
    # via the dind service alias, not localhost.
    TESTCONTAINERS_HOST_OVERRIDE: docker
    # Skip Ryuk reaper — it's the resource-cleanup container, but in dind it can't
    # reliably outlive the job. Containers get cleaned up when dind exits anyway.
    TESTCONTAINERS_RYUK_DISABLED: "true"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "master"'
  script:
    - mvn -B verify -Dsurefire.skip=true
  artifacts:
    when: always
    reports:
      junit:
        - target/failsafe-reports/TEST-*.xml
    expire_in: 1 week

Scan dependencies:
  extends: .Vulnerability scan template
  variables:
    LOCKFILE_PATH: "pom.xml"
  # Override the upstream template's script to add --no-resolve. By default osv-scanner's
  # Maven extractor tries to resolve transitives via deps.dev, which fails for this project
  # because our own artifact (waldur.keycloak:waldur-keycloak-mapper) isn't on Maven Central
  # — the resolver returns "rpc error: service unavailable" and that surfaces as exit 127
  # whenever the scan otherwise finds no vulnerabilities (see google/osv-scanner#348, #1121).
  # We forfeit transitive-dep CVE coverage here; acceptable because the only compile/runtime
  # deps we actually ship come transitively from Keycloak (`provided` scope), which is the
  # operator's responsibility and is covered by their own Keycloak version updates.
  script:
    - |
      CONFIG_FLAG=""
      if [ -f ".osv-scanner.toml" ]; then
        CONFIG_FLAG="--config=.osv-scanner.toml"
      fi
      osv-scanner scan --lockfile=${LOCKFILE_PATH} --no-resolve --format table ${CONFIG_FLAG}

.Deploy JAR template:
  stage: release
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE != "schedule"'
  script:
    - mvn -B deploy -Drevision=latest -s ci_settings.xml

Deploy latest JAR:
  image: maven:3.9-eclipse-temurin-17
  extends: .Deploy JAR template

Release artifact:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - apk update
    - apk add openjdk17 maven jq curl
    - echo $CI_COMMIT_TAG
    - mvn -B -Drevision=${CI_COMMIT_TAG} clean install
    - |
      RELEASE_DATA="{\"tag_name\": \"$CI_COMMIT_TAG\", \"name\": \"$CI_COMMIT_TAG\"}"
      UPLOAD_URL=$(curl -sH "Authorization: token $GITHUB_JENKINS_TOKEN" -X POST "https://api.github.com/repos/waldur/waldur-keycloak-mapper/releases" -d "$RELEASE_DATA" | jq -r '.upload_url' | cut -d "{" -f 1)
      curl -H "Authorization: token $GITHUB_JENKINS_TOKEN" -H "Content-Type: application/octet-stream" --data-binary "@target/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.jar" "$UPLOAD_URL?name=${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.jar"
  artifacts:
    paths:
      - "target/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.jar"
    expire_in: never
  release:
    tag_name: "$CI_COMMIT_TAG"
    description: "$CI_COMMIT_TAG_MESSAGE"
    assets:
      links:
        - name: "JAR"
          url: "https://code.opennodecloud.com/$CI_PROJECT_PATH/-/jobs/$CI_JOB_ID/artifacts/download"
